<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Item</title>
</head>
<body>
    <h1>Create New Item</h1>
    <form method="POST">
        {{ form.hidden_tag() }}
        {{ form.name.label }}
        {{ form.name(size=50)}}
        {{ form.description.label }}<br>
        {{ form.description.label }}
        {{ form.description(rows=5)}}
        {{ form.submit() }}
    </form>
    <a href="/">Back to Items</a>
</body>
</html>
