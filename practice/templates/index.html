{% extends "base.html" %}

{% block title %}Flasky{% endblock %}

{% block head%}
{{ super() }}
<style>
  #name{
       font-style: italic;
  }
</style>
{% endblock %}

{% block page_content %}
  <div class="page-header">
    <h1>Hi {{ name }}</h1>
  </div>
  <div>
    <form method="POST" action="/">
      {{ form.hidden_tag() }}
      {{ form.name.label }} {{ form.name(id='name') }}
      {{ form.submit() }}
    </form>
  </div>

{% endblock %}
